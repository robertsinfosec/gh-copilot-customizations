name: Release

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate control files
        run: bash scripts/validate.sh

      - name: Check CHANGELOG.md [Unreleased] section has content
        run: |
          # Extract everything between [Unreleased] heading and the next ## heading (or EOF)
          UNRELEASED=$(awk '/^## \[Unreleased\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md | grep -v '^[[:space:]]*$' || true)
          if [[ -z "$UNRELEASED" ]]; then
            echo "::error::CHANGELOG.md [Unreleased] section is empty. Run /update-changelog in Copilot chat to generate entries from git history, then commit the result."
            exit 1
          fi
          echo "Found [Unreleased] entries:"
          echo "$UNRELEASED"

  release:
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          YY=$(date -u +%y)
          MDD=$(date -u +%-m%d)
          HHMM=$(date -u +%-H%M)

          if [[ "$BRANCH" == "main" ]]; then
            VERSION="v${YY}.${MDD}.${HHMM}"
            PRERELEASE=false
          else
            SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9-]/-/g')
            VERSION="v${YY}.${MDD}.${HHMM}-${SAFE_BRANCH}"
            PRERELEASE=true
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "## Version: ${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "Pre-release: ${PRERELEASE}" >> "$GITHUB_STEP_SUMMARY"

      - name: Check tag does not already exist
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.version }} already exists"
            exit 1
          fi

      - name: Extract changelog for release body
        id: changelog
        run: |
          # Grab [Unreleased] content BEFORE stamping the version
          BODY=$(awk '/^## \[Unreleased\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md)
          STRIPPED=$(echo "$BODY" | grep -v '^[[:space:]]*$' || true)
          if [[ -z "$STRIPPED" ]]; then
            echo "::error::[Unreleased] section is empty — nothing to release."
            exit 1
          fi
          echo "$BODY" > release-notes.md

      - name: Stamp changelog with version
        if: steps.version.outputs.prerelease == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date -u +%Y-%m-%d)

          # Replace "## [Unreleased]" with "## [version] - date"
          # Content beneath it stays in place. No [Unreleased] section remains.
          awk -v ver="$VERSION" -v date="$DATE" '
            /^## \[Unreleased\]/ {
              printf "## [%s] - %s\n", ver, date
              next
            }
            { print }
          ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md

      - name: Build
        run: bash scripts/build.sh "${{ steps.version.outputs.version }}"

      - name: Package release artifact
        run: |
          cd dist
          tar -czf "../agent-control-files-${{ steps.version.outputs.version }}.tar.gz" .github/
          zip -r "../agent-control-files-${{ steps.version.outputs.version }}.zip" .github/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          body_path: release-notes.md
          files: |
            agent-control-files-${{ steps.version.outputs.version }}.tar.gz
            agent-control-files-${{ steps.version.outputs.version }}.zip

      - name: Commit stamped changelog to main
        if: steps.version.outputs.prerelease == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: stamp changelog for ${VERSION} [skip ci]"
          git push origin main

      - name: Open PR to sync source branch
        if: steps.version.outputs.prerelease == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Find which branch's PR triggered this push
          SOURCE_BRANCH=$(gh api "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq '.[0].head.ref // empty' 2>/dev/null || true)

          if [[ -z "$SOURCE_BRANCH" ]]; then
            echo "No source PR found (direct push) — skipping sync PR."
            exit 0
          fi

          echo "Opening sync PR: main → ${SOURCE_BRANCH}"
          gh pr create \
            --base "$SOURCE_BRANCH" \
            --head main \
            --title "chore: sync ${SOURCE_BRANCH} after ${VERSION}" \
            --body "Automated PR to bring the stamped changelog and release changes back to \`${SOURCE_BRANCH}\`." \
          || echo "PR already exists or branches are in sync."
